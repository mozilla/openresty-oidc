name: Build and push image

# Builds the image and pushes to Google Artifact Registry.
#
# Triggers:
#   - push to the default branch     -> publishes <ver>-<build>-<variant> and :latest
#   - manual workflow_dispatch       -> same tagging as push to main
#
# The image tag follows the convention <OPENRESTY_VERSION>-<BUILD_NUMBER>-<OPENRESTY_VARIANT>
# (e.g. 1.29.2.5-0-alpine). All three components come from the Makefile, which is
# the single source of truth. Bump BUILD_NUMBER in the same PR that changes any
# build input (Dockerfile, openidc version, etc.) so each published tag is unique.

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build, smoke-test, and push to GAR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    env:
      GAR_LOCATION: us-west1
      GCP_PROJECT_ID: moz-fx-platform-artifacts
      GAR_REPOSITORY: platform-shared-images
      IMAGE_NAME: openresty-oidc
      PLATFORMS: linux/amd64

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Resolve build args from Makefile
        id: makevars
        shell: bash
        run: |
          set -euo pipefail
          for var in OPENRESTY_VERSION OPENRESTY_VARIANT LUA_RESTY_OPENIDC_VERSION LUA_VERSION BUILD_NUMBER; do
            value=$(grep -E "^${var}[[:space:]]*\?=" Makefile | sed -E "s/^${var}[[:space:]]*\?=[[:space:]]*//")
            if [[ -z "$value" ]]; then
              echo "ERROR: could not resolve ${var} from Makefile" >&2
              exit 1
            fi
            echo "${var}=${value}" >> "$GITHUB_OUTPUT"
            echo "${var}=${value}"
          done
          # Compose the canonical image tag in the same shape the Makefile produces.
          IMAGE_TAG=$(grep -E "^OPENRESTY_VERSION[[:space:]]*\?=" Makefile | sed -E 's/.*\?=[[:space:]]*//')-$(grep -E "^BUILD_NUMBER[[:space:]]*\?=" Makefile | sed -E 's/.*\?=[[:space:]]*//')-$(grep -E "^OPENRESTY_VARIANT[[:space:]]*\?=" Makefile | sed -E 's/.*\?=[[:space:]]*//')
          echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "IMAGE_TAG=${IMAGE_TAG}"

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: |
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.makevars.outputs.IMAGE_TAG }}
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.makevars.outputs.IMAGE_TAG }}
            openresty.version=${{ steps.makevars.outputs.OPENRESTY_VERSION }}
            lua_resty_openidc.version=${{ steps.makevars.outputs.LUA_RESTY_OPENIDC_VERSION }}

      - name: Build image (load locally for smoke-test)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          platforms: ${{ env.PLATFORMS }}
          load: true
          push: false
          tags: openresty-oidc:ci
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            OPENRESTY_VERSION=${{ steps.makevars.outputs.OPENRESTY_VERSION }}
            OPENRESTY_VARIANT=${{ steps.makevars.outputs.OPENRESTY_VARIANT }}
            LUA_RESTY_OPENIDC_VERSION=${{ steps.makevars.outputs.LUA_RESTY_OPENIDC_VERSION }}
            LUA_VERSION=${{ steps.makevars.outputs.LUA_VERSION }}
            IMAGE_SOURCE=${{ github.server_url }}/${{ github.repository }}
            IMAGE_VERSION=${{ steps.makevars.outputs.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test
        shell: bash
        run: make smoke-test IMAGE=openresty-oidc:ci PLATFORM=${{ env.PLATFORMS }}

      - id: gcp-auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          token_format: 'access_token'
          service_account: artifact-writer@${{ env.GCP_PROJECT_ID }}.iam.gserviceaccount.com
          workload_identity_provider: ${{ vars.GCPV2_GITHUB_WORKLOAD_IDENTITY_PROVIDER }}

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.GAR_LOCATION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.gcp-auth.outputs.access_token }}

      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            OPENRESTY_VERSION=${{ steps.makevars.outputs.OPENRESTY_VERSION }}
            OPENRESTY_VARIANT=${{ steps.makevars.outputs.OPENRESTY_VARIANT }}
            LUA_RESTY_OPENIDC_VERSION=${{ steps.makevars.outputs.LUA_RESTY_OPENIDC_VERSION }}
            LUA_VERSION=${{ steps.makevars.outputs.LUA_VERSION }}
            IMAGE_SOURCE=${{ github.server_url }}/${{ github.repository }}
            IMAGE_VERSION=${{ steps.makevars.outputs.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        shell: bash
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          {
            echo "### Pushed tags"
            echo ""
            echo '```'
            echo "$TAGS"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
