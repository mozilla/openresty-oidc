name: PR checks

# Runs on every pull request targeting the default branch.
# Builds the image locally and runs the same smoke-test suite the release
# pipeline uses, but never pushes anywhere. No GAR auth and no id-token
# permission are needed.

on:
  pull_request:
    branches:
      - main

concurrency:
  group: pr-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-test:
    name: Build and smoke-test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      PLATFORMS: linux/amd64

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build image (load locally; do not push)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          platforms: ${{ env.PLATFORMS }}
          load: true
          push: false
          tags: openresty-oidc:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test
        shell: bash
        run: make smoke-test IMAGE=openresty-oidc:ci PLATFORM=${{ env.PLATFORMS }}
